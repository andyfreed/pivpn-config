# systemd drop-in for ssh.service — install to:
#   /etc/systemd/system/ssh.service.d/10-wait-network.conf
#
# sshd binds a specific address (ListenAddress 192.168.5.1, the eth0 client
# LAN — see sshd_config.d/listen.conf). At boot it can start before
# NetworkManager has brought that address up, so the bind fails with
# "Cannot assign requested address" and the unit stays dead until manually
# restarted (remote access still works because Tailscale SSH is independent,
# so this goes unnoticed until someone needs to SSH in from the client LAN).
#
# Wait for the network to be online and, if the race is still lost, retry
# until the address exists.
[Unit]
After=network-online.target
Wants=network-online.target

[Service]
Restart=on-failure
RestartSec=3
StartLimitIntervalSec=0
